<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangPro 3.1 Definitive | Finaltime Studio</title>
    <style>
        :root {
            --bg-deep: #050505; --surface: #121214; --surface-hover: #1e1e24;
            --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.4);
            --text-main: #ededed; --text-muted: #a1a1aa;
            --danger: #e11d48; --success: #10b981; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Headers */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .logo-container { display: flex; flex-direction: column; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, #a78bfa, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .studio-name { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .lang-select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }

        .app-wrapper { display: flex; flex: 1; flex-direction: column; overflow: hidden; position: relative; }
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .view-content { width: 100%; max-width: 500px; padding-bottom: 80px; }
        
        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .view.active { display: flex; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* Gamification HUD */
        .hud { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .hud-stat { text-align: center; }
        .hud-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .hud-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .time-bonus { font-size: 0.8rem; color: var(--success); opacity: 0; transition: opacity 0.3s; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .time-bonus.active { opacity: 1; }

        /* UI Elements */
        .deck-selector { width: 100%; padding: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 20px; outline: none; cursor: pointer; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; background: var(--surface-hover); color: var(--text-main); margin-bottom: 12px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-danger { background: rgba(225, 29, 72, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.5); color: white; margin-bottom: 20px; font-size: 1rem; transition: border 0.3s; }
        input:focus { outline: none; border-color: var(--primary); }
        label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* File Upload */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; text-align: center; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

        /* Nav Bottom */
        nav { display: flex; background: rgba(18, 18, 20, 0.9); backdrop-filter: blur(15px); padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(255,255,255,0.05); position: absolute; bottom: 0; width: 100%; z-index: 50; }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #52525b; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--text-main); }
        .nav-item.active .nav-icon { color: var(--primary); transform: translateY(-2px); }
        .nav-icon { font-size: 1.4rem; transition: transform 0.3s; }

        /* Neural Card System */
        .card-container { perspective: 2000px; width: 100%; height: 400px; margin-bottom: 10px; }
        .card { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; cursor: pointer; position: relative; }
        .card.flipped { transform: rotateX(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--surface); border-radius: 24px; padding: 30px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); }
        .card-back { transform: rotateX(180deg); background: linear-gradient(180deg, #121214, #0a0a0c); }
        
        .card-img { max-width: 100%; height: 140px; border-radius: 12px; margin-bottom: 20px; object-fit: cover; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .word-main { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .word-sub { font-size: 1.8rem; color: var(--text-main); margin: 5px 0; font-weight: 800; }
        .btn-audio { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; color: white; margin-top: 20px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-audio:active { background: var(--primary); transform: scale(0.9); }

        .study-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; opacity: 0; transform: translateY(20px); pointer-events: none; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .study-controls.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .btn-sm2 { padding: 14px 5px; border-radius: 14px; border: none; font-weight: 800; font-size: 0.9rem; color: white; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn-sm2:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-sm2.again { border-bottom: 3px solid var(--danger); }
        .btn-sm2.hard { border-bottom: 3px solid var(--warning); }
        .btn-sm2.good { border-bottom: 3px solid var(--success); }
        .btn-sm2.easy { border-bottom: 3px solid var(--primary); }
        .btn-sm2 span { font-size: 0.7rem; color: var(--text-muted); margin-top: 6px; font-weight: 600; }

        /* Desktop Sidebar */
        @media (min-width: 800px) {
            body { flex-direction: row; }
            #mobile-header { display: none; }
            .app-wrapper { flex-direction: row; width: 100%; }
            nav { position: relative; flex-direction: column; width: 260px; justify-content: flex-start; padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); border-top: none; background: #09090b; }
            nav::before { content: 'LangPro 3.1'; font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: left; padding-left: 10px; margin-bottom: 5px; }
            nav::after { content: 'FINALTIME STUDIO'; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 2px; font-weight: bold; text-align: left; padding-left: 12px; display: block; margin-bottom: 30px; }
            .nav-item { flex: none; padding: 16px 20px; text-align: left; flex-direction: row; justify-content: flex-start; border-radius: 14px; margin-bottom: 8px; font-size: 1rem; }
            .nav-item:hover { background: rgba(255,255,255,0.03); }
            .nav-item.active { background: rgba(255,255,255,0.08); }
            .nav-item.active .nav-icon { transform: translateY(0); margin-right: 15px; }
            .nav-icon { margin-right: 15px; font-size: 1.2rem; }
            main { padding: 40px; align-items: center; justify-content: center; }
            .view-content { padding-bottom: 0; max-width: 600px; }
            .card-container { height: 480px; }
            .word-main { font-size: 3rem; }
            #pc-lang-box { display: block !important; margin-bottom: 40px; padding-left: 10px;}
        }
    </style>
</head>
<body>

    <header id="mobile-header">
        <div class="logo-container">
            <div class="logo">LangPro 3.1</div>
            <span class="studio-name">Finaltime Studio</span>
        </div>
        <select class="lang-select" onchange="changeLang(this.value)" id="lang-sel-mob">
            <option value="pt">PT</option><option value="en">EN</option><option value="fr">FR</option>
        </select>
    </header>

    <div class="app-wrapper">
        <nav>
            <div id="pc-lang-box" style="display: none;">
                <select class="lang-select" onchange="changeLang(this.value)" id="lang-sel-pc">
                    <option value="pt">Idioma: PT</option><option value="en">Language: EN</option><option value="fr">Langue: FR</option>
                </select>
            </div>
            
            <div class="nav-item active" onclick="switchView('study', this)">
                <span class="nav-icon">🧠</span> <span id="nav-study">Treinamento</span>
            </div>
            <div class="nav-item" onclick="switchView('decks', this)">
                <span class="nav-icon">➕</span> <span id="nav-decks">Forjar Cartas</span>
            </div>
            <div class="nav-item" onclick="switchView('settings', this)">
                <span class="nav-icon">⚙️</span> <span id="nav-settings">Sistema</span>
            </div>
        </nav>

        <main>
            <div id="view-study" class="view active">
                <div class="view-content">
                    <select class="deck-selector" id="active-deck" onchange="changeDeck()">
                        <option value="en_core">🇺🇸 Inglês: Enfermagem & Gestão</option>
                        <option value="fr_imig">🇫🇷 Francês: Adaptação & Imigração</option>
                    </select>

                    <div class="hud">
                        <div class="hud-stat"><div class="hud-val" id="hud-level">1</div><div class="hud-label" id="lbl-lvl">Nível</div></div>
                        <div class="hud-stat"><div class="hud-val" id="hud-xp">0</div><div class="hud-label">XP</div></div>
                        <div class="hud-stat"><div class="hud-val" id="hud-cards">0</div><div class="hud-label" id="lbl-queue">Fila</div></div>
                    </div>

                    <div id="time-bonus-msg" class="time-bonus">⚡ TIME BONUS: 2X XP!</div>

                    <div id="no-cards-msg" style="display: none; text-align: center; color: var(--text-muted); margin-top: 40px;">
                        <div style="font-size: 4rem; margin-bottom: 20px; filter: grayscale(100%); opacity: 0.5;">🏆</div>
                        <p id="txt-done" style="font-size: 1.2rem; font-weight: bold;">Sinapses otimizadas por hoje.</p>
                    </div>
                    
                    <div id="study-area">
                        <div class="card-container" onclick="flipCard()">
                            <div class="card" id="flashcard">
                                <div class="card-face card-front">
                                    <img id="front-img" class="card-img" src="">
                                    <div class="word-main" id="front-word">...</div>
                                    <div id="txt-tap" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;">Toque para revelar</div>
                                </div>
                                <div class="card-face card-back">
                                    <div class="word-sub" id="back-target">...</div>
                                    <button class="btn-audio" onclick="playAudio(event)">🔊</button>
                                </div>
                            </div>
                        </div>

                        <div class="study-controls" id="controls">
                            <button class="btn-sm2 again" onclick="processAnswer(0)"><span id="btn-again" style="font-size:0.9rem;color:white;margin:0;">Errei</span><span id="time-again">&lt;1m</span></button>
                            <button class="btn-sm2 hard" onclick="processAnswer(1)"><span id="btn-hard" style="font-size:0.9rem;color:white;margin:0;">Difícil</span><span id="time-hard">...</span></button>
                            <button class="btn-sm2 good" onclick="processAnswer(2)"><span id="btn-good" style="font-size:0.9rem;color:white;margin:0;">Bom</span><span id="time-good">...</span></button>
                            <button class="btn-sm2 easy" onclick="processAnswer(3)"><span id="btn-easy" style="font-size:0.9rem;color:white;margin:0;">Fácil</span><span id="time-easy">...</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-decks" class="view">
                <div class="view-content">
                    <h2 id="title-add" style="margin-bottom: 25px; font-size: 1.5rem; letter-spacing: -0.5px;">Forjar Nova Conexão</h2>
                    
                    <label id="lbl-deck">Deck de Destino</label>
                    <select id="input-deck" style="width: 100%; padding: 16px; border-radius: 12px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px;">
                        <option value="en_core">Inglês: Enfermagem & Gestão</option>
                        <option value="fr_imig">Francês: Adaptação & Imigração</option>
                    </select>

                    <label id="lbl-front">Frente (Sua língua base)</label>
                    <input type="text" id="input-front" placeholder="...">
                    
                    <label id="lbl-target">Verso (Idioma Alvo)</label>
                    <input type="text" id="input-target" placeholder="...">

                    <label id="lbl-img">Memória Visual (Opcional)</label>
                    <div class="file-upload-wrapper btn" style="background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2);">
                        <span id="txt-upload">📁 Escolher Imagem</span>
                        <input type="file" id="input-img" accept="image/*" onchange="handleImg(event)">
                    </div>
                    <img id="img-preview" src="" style="max-width: 100%; height: 120px; object-fit: cover; display: none; margin: 0 auto 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">

                    <button class="btn btn-primary" id="btn-save-card" onclick="addCard()" style="margin-top: 10px;">Salvar no Banco de Dados</button>
                </div>
            </div>

            <div id="view-settings" class="view">
                <div class="view-content">
                    <h2 id="title-sys" style="margin-bottom: 25px; font-size: 1.5rem;">Arquitetura de Dados</h2>
                    
                    <button class="btn btn-primary" id="btn-export" onclick="exportDB()">⬇️ Exportar Backup (.json)</button>
                    
                    <div class="file-upload-wrapper btn" style="background: var(--surface-hover);">
                        <span id="btn-import">⬆️ Importar Backup (.json)</span>
                        <input type="file" accept=".json" onchange="importDB(event)">
                    </div>

                    <div style="margin-top: 40px; border-top: 1px solid rgba(255,0,0,0.2); padding-top: 30px;">
                        <button class="btn btn-danger" id="btn-reset" onclick="hardReset()">⚠️ Hard Reset (Limpar DB)</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- i18n Dictionary ---
        const dic = {
            pt: {
                navT: "Treinamento", navF: "Forjar Cartas", navS: "Sistema",
                lvl: "Nível", queue: "Fila", done: "Sinapses otimizadas por hoje.", tap: "Toque para revelar",
                again: "Errei", hard: "Difícil", good: "Bom", easy: "Fácil",
                tAdd: "Forjar Nova Conexão", lDeck: "Deck de Destino", lFront: "Frente (Língua base)", lTarget: "Verso (Idioma Alvo)",
                lImg: "Memória Visual (Opcional)", tUp: "📁 Escolher Imagem", bSave: "Salvar no Banco de Dados",
                tSys: "Arquitetura de Dados", bExp: "⬇️ Exportar Backup (.json)", bImp: "⬆️ Importar Backup (.json)", bRes: "⚠️ Hard Reset (Limpar DB)",
                alertSave: "Conexão salva no banco!", alertImp: "Backup importado com sucesso!", alertErr: "Erro no arquivo JSON.", alertRes: "CRÍTICO: Apagar todos os dados?"
            },
            en: {
                navT: "Training", navF: "Forge Cards", navS: "System",
                lvl: "Level", queue: "Queue", done: "Synapses optimized for today.", tap: "Tap to reveal",
                again: "Again", hard: "Hard", good: "Good", easy: "Easy",
                tAdd: "Forge New Connection", lDeck: "Target Deck", lFront: "Front (Base language)", lTarget: "Back (Target language)",
                lImg: "Visual Memory (Optional)", tUp: "📁 Choose Image", bSave: "Save to Database",
                tSys: "Data Architecture", bExp: "⬇️ Export Backup (.json)", bImp: "⬆️ Import Backup (.json)", bRes: "⚠️ Hard Reset (Clear DB)",
                alertSave: "Connection saved to DB!", alertImp: "Backup imported successfully!", alertErr: "Invalid JSON file.", alertRes: "CRITICAL: Delete all data?"
            },
            fr: {
                navT: "Entraînement", navF: "Forger Cartes", navS: "Système",
                lvl: "Niveau", queue: "File", done: "Synapses optimisées pour aujourd'hui.", tap: "Touchez pour révéler",
                again: "Encore", hard: "Difficile", good: "Bon", easy: "Facile",
                tAdd: "Forger Nouvelle Connexion", lDeck: "Deck Cible", lFront: "Recto (Langue de base)", lTarget: "Verso (Langue cible)",
                lImg: "Mémoire Visuelle (Optionnel)", tUp: "📁 Choisir Image", bSave: "Sauvegarder",
                tSys: "Architecture de Données", bExp: "⬇️ Exporter Backup (.json)", bImp: "⬆️ Importer Backup (.json)", bRes: "⚠️ Hard Reset (Effacer DB)",
                alertSave: "Connexion sauvegardée !", alertImp: "Backup importé avec succès !", alertErr: "Fichier JSON invalide.", alertRes: "CRITIQUE: Effacer toutes les données ?"
            }
        };

        let currentLang = 'pt';
        function changeLang(lang) {
            currentLang = lang; const d = dic[lang];
            document.getElementById('lang-sel-mob').value = lang;
            document.getElementById('lang-sel-pc').value = lang;
            
            document.getElementById('nav-study').innerText = d.navT;
            document.getElementById('nav-decks').innerText = d.navF;
            document.getElementById('nav-settings').innerText = d.navS;
            document.getElementById('lbl-lvl').innerText = d.lvl;
            document.getElementById('lbl-queue').innerText = d.queue;
            document.getElementById('txt-done').innerText = d.done;
            document.getElementById('txt-tap').innerText = d.tap;
            document.getElementById('btn-again').innerText = d.again;
            document.getElementById('btn-hard').innerText = d.hard;
            document.getElementById('btn-good').innerText = d.good;
            document.getElementById('btn-easy').innerText = d.easy;
            document.getElementById('title-add').innerText = d.tAdd;
            document.getElementById('lbl-deck').innerText = d.lDeck;
            document.getElementById('lbl-front').innerText = d.lFront;
            document.getElementById('lbl-target').innerText = d.lTarget;
            document.getElementById('lbl-img').innerText = d.lImg;
            if(!tempB64) document.getElementById('txt-upload').innerText = d.tUp;
            document.getElementById('btn-save-card').innerText = d.bSave;
            document.getElementById('title-sys').innerText = d.tSys;
            document.getElementById('btn-export').innerText = d.bExp;
            document.getElementById('btn-import').innerText = d.bImp;
            document.getElementById('btn-reset').innerText = d.bRes;
        }

        // --- Data Architecture ---
        const defaultState = {
            user: { xp: 0, level: 1 },
            decks: {
                en_core: { langCode: 'en-US', cards: [
                    { id: 1, front: "Pronto-Socorro", target: "Emergency Room", img: "", interval: 0, reps: 0, ease: 2.5, nextReview: 0 },
                    { id: 2, front: "Seringa", target: "Syringe", img: "", interval: 0, reps: 0, ease: 2.5, nextReview: 0 }
                ]},
                fr_imig: { langCode: 'fr-CA', cards: [
                    { id: 3, front: "Roupas de frio extremo", target: "Vêtements de grand froid", img: "", interval: 0, reps: 0, ease: 2.5, nextReview: 0 }
                ]}
            }
        };

        let appData = JSON.parse(localStorage.getItem('langProDB_Final')) || JSON.parse(JSON.stringify(defaultState));
        let currentDeckId = 'en_core', queue = [], currentCard = null, isFlipped = false, cardStartTime = 0;
        let tempB64 = "";

        function saveDB() { localStorage.setItem('langProDB_Final', JSON.stringify(appData)); }

        // --- View Logic ---
        function switchView(viewId, navEl) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(navEl) navEl.classList.add('active');
            if(viewId === 'study') initStudy();
        }

        function updateHUD() {
            document.getElementById('hud-level').innerText = appData.user.level;
            document.getElementById('hud-xp').innerText = appData.user.xp;
            document.getElementById('hud-cards').innerText = queue.length;
        }

        // --- Study Core ---
        function changeDeck() { currentDeckId = document.getElementById('active-deck').value; initStudy(); }

        function initStudy() {
            const now = Date.now();
            queue = appData.decks[currentDeckId].cards.filter(c => c.nextReview <= now).sort(() => Math.random() - 0.5);
            updateHUD(); renderCard();
        }

        function renderCard() {
            const area = document.getElementById('study-area'), msg = document.getElementById('no-cards-msg');
            const cardEl = document.getElementById('flashcard'), controls = document.getElementById('controls');

            if (queue.length === 0) { area.style.display = 'none'; msg.style.display = 'block'; return; }
            area.style.display = 'block'; msg.style.display = 'none';
            
            currentCard = queue[0]; isFlipped = false; cardStartTime = Date.now();
            cardEl.classList.remove('flipped'); controls.classList.remove('visible');

            setTimeout(() => {
                const imgEl = document.getElementById('front-img');
                if(currentCard.img) { imgEl.src = currentCard.img; imgEl.style.display = 'block'; } 
                else { imgEl.style.display = 'none'; }
                
                document.getElementById('front-word').innerText = currentCard.front;
                document.getElementById('back-target').innerText = currentCard.target;
                
                const fmt = (d) => d < 1 ? "< 1d" : `${Math.round(d)}d`;
                document.getElementById('time-hard').innerText = fmt(currentCard.interval === 0 ? 1 : currentCard.interval * 1.2);
                document.getElementById('time-good').innerText = fmt(currentCard.reps === 0 ? 1 : (currentCard.reps === 1 ? 6 : currentCard.interval * currentCard.ease));
                document.getElementById('time-easy').innerText = fmt(currentCard.reps === 0 ? 4 : currentCard.interval * currentCard.ease * 1.3);
            }, 250);
        }

        function flipCard() {
            if (queue.length === 0 || isFlipped) return;
            isFlipped = true;
            document.getElementById('flashcard').classList.add('flipped');
            document.getElementById('controls').classList.add('visible');
            triggerTTS(currentCard.target);
        }

        function triggerTTS(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = appData.decks[currentDeckId].langCode; u.rate = 0.9;
                window.speechSynthesis.speak(u);
            }
        }
        function playAudio(e) { e.stopPropagation(); triggerTTS(currentCard.target); }

        function processAnswer(quality) {
            event.stopPropagation();
            const timeTaken = (Date.now() - cardStartTime) / 1000;
            const isFast = quality > 0 && timeTaken < 3.0;

            let card = queue.shift();
            if (quality === 0) {
                card.reps = 0; card.interval = 1; queue.push(card); 
            } else {
                if (quality === 1) card.interval = card.interval === 0 ? 1 : card.interval * 1.2;
                else if (quality === 2) card.interval = card.reps === 0 ? 1 : (card.reps === 1 ? 6 : card.interval * card.ease);
                else if (quality === 3) card.interval = card.reps === 0 ? 4 : card.interval * card.ease * 1.3;
                card.reps++; card.ease = Math.max(1.3, card.ease + (0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02)));
                
                // XP System
                if(isFast) {
                    const msg = document.getElementById('time-bonus-msg');
                    msg.classList.add('active'); setTimeout(() => msg.classList.remove('active'), 1500);
                }
                appData.user.xp += (isFast ? quality * 20 : quality * 10);
                if(appData.user.xp >= appData.user.level * 200) { appData.user.level++; appData.user.xp = 0; }
            }

            if (quality !== 0) card.nextReview = Date.now() + (card.interval * 86400000);
            
            const arr = appData.decks[currentDeckId].cards;
            arr[arr.findIndex(c => c.id === card.id)] = card;
            saveDB(); updateHUD(); renderCard();
        }

        // --- File Management & Logic ---
        function handleImg(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    tempB64 = evt.target.result;
                    const prev = document.getElementById('img-preview');
                    prev.src = tempB64; prev.style.display = 'block';
                    document.getElementById('txt-upload').innerText = "✅ Imagem Carregada!";
                };
                reader.readAsDataURL(file);
            }
        }

        function addCard() {
            const tDeck = document.getElementById('input-deck').value;
            const front = document.getElementById('input-front').value.trim();
            const target = document.getElementById('input-target').value.trim();
            if(!front || !target) return;

            appData.decks[tDeck].cards.push({
                id: Date.now(), front, target, img: tempB64, interval: 0, reps: 0, ease: 2.5, nextReview: 0
            });
            saveDB();
            
            document.getElementById('input-front').value = '';
            document.getElementById('input-target').value = '';
            document.getElementById('img-preview').style.display = 'none';
            tempB64 = ""; document.getElementById('txt-upload').innerText = dic[currentLang].tUp;
            
            alert(dic[currentLang].alertSave);
            if(tDeck === currentDeckId) initStudy();
        }

        function exportDB() {
            const str = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const dl = document.createElement('a'); dl.href = str; dl.download = "LangPro_3-1_Backup.json";
            document.body.appendChild(dl); dl.click(); dl.remove();
        }

        function importDB(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const imp = JSON.parse(evt.target.result);
                    if(imp && imp.decks) { appData = imp; saveDB(); alert(dic[currentLang].alertImp); location.reload(); } 
                    else throw new Error();
                } catch(err) { alert(dic[currentLang].alertErr); }
            };
            reader.readAsText(file);
        }

        function hardReset() { if(confirm(dic[currentLang].alertRes)) { localStorage.removeItem('langProDB_Final'); location.reload(); } }

        // Boot
        changeLang('pt');
        initStudy();
    </script>
</body>
</html>
